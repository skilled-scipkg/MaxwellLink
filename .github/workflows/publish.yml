name: Publish to PyPI

on:
  push:
    branches: [ main ]
    paths:
      - "pyproject.toml"
      - "setup.py"
      - "MANIFEST.in"
      - "AGENTS.md"
      - "README.md"
      - "HPC_PROFILE.json"
      - "src/**"
      - "tests/**"
      - "skills/**"
      - "docs/source/**"
      - "media/**"
      - "tutorials/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install build tooling
        run: |
          python -m pip install -U pip
          python -m pip install build packaging

      - name: Read package version
        id: pkg
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text())
          version = data["project"]["version"]
          print(f"Local version: {version}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
          PY

      - name: Compare against PyPI
        id: version_check
        env:
          LOCAL_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          from packaging.version import Version

          package = "maxwelllink"
          local = os.environ["LOCAL_VERSION"]
          try:
              with urllib.request.urlopen(f"https://pypi.org/pypi/{package}/json") as resp:
                  data = json.load(resp)
                  published = data["info"]["version"]
          except Exception as exc:  # pragma: no cover - network guard
              print(f"Could not fetch PyPI metadata: {exc}")
              published = ""

          should_publish = not published or Version(local) > Version(published)
          print(f"PyPI version: {published or 'none'}")
          print(f"Publish? {should_publish}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"publish={'true' if should_publish else 'false'}\n")
              fh.write(f"pypi_version={published}\n")
          PY

      - name: Build distributions
        if: steps.version_check.outputs.publish == 'true'
        run: python -m build

      - name: Verify mxl init/clean CLI from built wheel
        if: steps.version_check.outputs.publish == 'true'
        run: |
          set -euo pipefail
          python -m pip install --force-reinstall --no-deps dist/*.whl

          tmpdir="$(mktemp -d)"
          cd "$tmpdir"

          # Preferred subcommands
          mxl init
          test -f AGENTS.md
          test -L src
          test -L tests
          test -L skills
          test -L docs
          test -L media
          test -L tutorials
          test -L README.md
          test -L CLAUDE.md
          test -L GEMINI.md
          if command -v sbatch >/dev/null 2>&1; then
            test -L HPC_PROFILE.json
            test -f "${HOME}/.maxwelllink/HPC_PROFILE.json"
          else
            test ! -e HPC_PROFILE.json
          fi

          mxl clean
          test ! -e AGENTS.md
          test ! -e src
          test ! -e tests
          test ! -e skills
          test ! -e docs
          test ! -e media
          test ! -e tutorials
          test ! -e README.md
          test ! -e CLAUDE.md
          test ! -e GEMINI.md
          test ! -e HPC_PROFILE.json
          if command -v sbatch >/dev/null 2>&1; then
            test -f "${HOME}/.maxwelllink/HPC_PROFILE.json"
          fi

          # Backward-compatible aliases
          mxl-init
          test -f AGENTS.md
          test -L src
          mxl-clean
          test ! -e AGENTS.md
          test ! -e src

          # Set user profile explicitly and verify persistence
          cp "${GITHUB_WORKSPACE}/HPC_PROFILE.json" custom_hpc.json
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("custom_hpc.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          data["slurm_default_partition"] = "debug"
          p.write_text(json.dumps(data, indent=2) + "\n", encoding="utf-8")
          PY
          mxl hpc set custom_hpc.json
          grep -q '"slurm_default_partition": "debug"' "${HOME}/.maxwelllink/HPC_PROFILE.json"

      - name: Publish to PyPI
        if: steps.version_check.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
